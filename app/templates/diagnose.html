<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日志诊断 - AgentPlay</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="inner">
    <a href="/" class="logo">
      <span class="icon">&#9889;</span>
      AgentPlay
    </a>
    <nav>
      <a href="/">仪表盘</a>
      <a href="/servers">服务器</a>
      <a href="/diagnose" class="active">日志诊断</a>
      <a href="/alerts">告警</a>
      <a href="/timeline">时间线</a>
      <a href="/knowledge">知识库</a>
      <a href="/history">历史记录</a>
      <a href="/providers">供应商</a>
    </nav>
  </div>
</header>

<main class="container">

  <div class="card">
    <h2>日志诊断</h2>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <p class="desc" style="margin-bottom:0">粘贴日志内容或使用示例快速体验：</p>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="loadSample('nginx502')">Nginx 502</button>
        <button class="btn btn-outline btn-sm" onclick="loadSample('mysqlConn')">MySQL 连接</button>
        <button class="btn btn-outline btn-sm" onclick="loadSample('dockerOOM')">Docker OOM</button>
      </div>
    </div>
    
    <div id="file-chips" class="file-chips"></div>
    <div class="log-input-wrap">
      <textarea id="log-input" placeholder="在此粘贴日志内容..."></textarea>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="diagnose-btn" onclick="diagnoseStream()">开始诊断</button>
      <select class="hint-select" id="service-hint">
        <option value="">自动识别服务类型</option>
        <option value="Nginx">Nginx</option>
        <option value="MySQL">MySQL / MariaDB</option>
        <option value="Docker">Docker</option>
        <option value="Linux系统">Linux 系统</option>
        <option value="Kubernetes">Kubernetes</option>
      </select>
      <select class="hint-select" id="provider-select">
        <option value="">默认供应商</option>
      </select>
      <a href="/providers" class="provider-link" title="管理供应商">&#9881;</a>
      <label for="file-input" class="btn btn-outline btn-sm" style="cursor:pointer">选择文件</label>
      <input type="file" id="file-input" accept=".log,.txt,.out" onchange="handleFilePick(this)" style="display:none">
    </div>
  </div>

  <div id="result-section" class="result-section">
    <div id="spinner" class="spinner"></div>
    <div class="result-card">
      <div id="result-content"></div>
    </div>
  </div>

</main>

<footer>AgentPlay &mdash; AI 驱动的运维工作台</footer>
<div id="toast" class="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
