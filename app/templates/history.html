<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史记录 - AgentPlay</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="inner">
    <a href="/" class="logo">
      <span class="icon">&#9889;</span>
      AgentPlay
    </a>
    <nav>
      <a href="/">仪表盘</a>
      <a href="/servers">服务器</a>
      <a href="/diagnose">日志诊断</a>
      <a href="/timeline">时间线</a>
      <a href="/knowledge">知识库</a>
      <a href="/history" class="active">历史记录</a>
      <a href="/providers">供应商</a>
    </nav>
  </div>
</header>

<main class="container">

  <div class="card">
    <h2>历史诊断记录</h2>
    <div id="history-content">
      <div class="spinner active"></div>
    </div>
  </div>

</main>

<footer>AgentPlay &mdash; AI 驱动的运维工作台</footer>

<script>
async function loadHistory() {
  const container = document.getElementById("history-content");
  try {
    const resp = await fetch("/api/history");
    const data = await resp.json();
    if (!data.records || data.records.length === 0) {
      container.innerHTML = '<div class="empty"><span class="icon">&#128203;</span><p>暂无诊断记录</p></div>';
      return;
    }
    let html = '<table class="data-table"><thead><tr><th style="width:50px">ID</th><th>时间</th><th>日志预览</th><th style="width:80px">严重程度</th><th>摘要</th><th class="col-actions">操作</th></tr></thead><tbody>';
    for (const r of data.records) {
      const sevClass = getSeverityClass(r.severity);
      html += `<tr>
        <td style="color:#9aa0a6">#${r.id}</td>
        <td style="white-space:nowrap;font-size:12px;color:#5f6368">${new Date(r.timestamp).toLocaleString("zh-CN")}</td>
        <td class="col-preview">${escapeHtml(r.log_preview || "")}</td>
        <td><span class="severity-badge ${sevClass}">${r.severity || "-"}</span></td>
        <td>${escapeHtml(r.summary || "")}</td>
        <td class="col-actions"><button onclick="viewDetail(${r.id})">查看</button></td>
      </tr>`;
    }
    html += "</tbody></table>";
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<p style="color:#d93025">加载失败: ${escapeHtml(e.message)}</p>`;
  }
}

function getSeverityClass(sev) {
  const m = { "P0-紧急": "severity-p0", "P1-严重": "severity-p1", "P2-一般": "severity-p2", "P3-提示": "severity-p3" };
  return m[sev] || "";
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function viewDetail(id) {
  try {
    const resp = await fetch("/api/history/" + id);
    const data = await resp.json();
    const result = JSON.parse(data.full_result || "{}");
    let stepsHtml = (result.fix_steps || []).map((s, i) => `<li>${escapeHtml(s)}</li>`).join("");
    const html = `<div class="result-body">
      <p style="color:#5f6368;font-size:12px;margin-bottom:12px">
        ${new Date(data.timestamp).toLocaleString("zh-CN")} &mdash; ${escapeHtml(data.log_preview)}
      </p>
      <h3>问题摘要</h3><p>${escapeHtml(result.summary || "")}</p>
      <span class="severity-badge ${getSeverityClass(result.severity)}">${result.severity}</span>
      <h3>根因分析</h3><p>${escapeHtml(result.root_cause || "")}</p>
      <h3>修复步骤</h3><ol>${stepsHtml || "<li>无</li>"}</ol>
      <h3>预防建议</h3><p>${escapeHtml(result.prevention || "")}</p>
      <p style="margin-top:20px"><a href="/history">&larr; 返回列表</a> &nbsp; <a href="#" onclick="exportReport(RECORD_ID)" style="color:#1a73e8">导出 Markdown</a></p>
    </div>`;
    document.getElementById("history-content").innerHTML = html;
      window.RECORD_ID = id;
  } catch (e) {
    alert("加载失败: " + e.message);
  }
}

loadHistory();
</script>
</body>
</html>
