<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史记录 - LogDoctor</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="inner">
    <a href="/" class="logo">
      <span class="icon">&#9889;</span>
      LogDoctor
    </a>
    <nav>
      <a href="/">诊断</a>
      <a href="/history">历史记录</a>
    </nav>
  </div>
</header>

<main class="container">

  <div class="card">
    <h2>历史诊断记录</h2>
    <div id="history-content">
      <div class="spinner active"></div>
    </div>
  </div>

</main>

<footer>LogDoctor &mdash; AI 驱动的运维日志诊断工具</footer>

<script>
async function loadHistory() {
  const container = document.getElementById("history-content");
  try {
    const resp = await fetch("/api/history");
    const data = await resp.json();
    if (!data.records || data.records.length === 0) {
      container.innerHTML = '<div class="empty"><span class="icon">&#128203;</span><p>暂无诊断记录</p></div>';
      return;
    }
    let html = '<table class="history-table"><thead><tr><th>ID</th><th>时间</th><th>日志预览</th><th>严重程度</th><th>摘要</th><th>操作</th></tr></thead><tbody>';
    for (const r of data.records) {
      const sevClass = getSeverityClass(r.severity);
      html += `<tr>
        <td>#${r.id}</td>
        <td>${new Date(r.timestamp).toLocaleString("zh-CN")}</td>
        <td class="log-preview">${escapeHtml(r.log_preview || "")}</td>
        <td><span class="severity-badge ${sevClass}">${r.severity || "-"}</span></td>
        <td>${escapeHtml(r.summary || "")}</td>
        <td><a href="javascript:viewDetail(${r.id})">查看</a></td>
      </tr>`;
    }
    html += "</tbody></table>";
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<p style="color:#d63031">加载失败: ${escapeHtml(e.message)}</p>`;
  }
}

function getSeverityClass(sev) {
  const m = {
    "P0-紧急": "severity-P0: 紧急",
    "P1-严重": "severity-P1: 严重",
    "P2-一般": "severity-P2: 一般",
    "P3-提示": "severity-P3: 提示",
  };
  return m[sev] || "";
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function viewDetail(id) {
  try {
    const resp = await fetch("/api/history/" + id);
    const data = await resp.json();
    const result = JSON.parse(data.full_result || "{}");
    const html = `<div class="result-body">
      <p><strong>日志预览:</strong> ${escapeHtml(data.log_preview)}</p>
      <h3>问题摘要</h3><p>${escapeHtml(result.summary || "")}</p>
      <span class="severity-badge ${getSeverityClass(result.severity)}">${result.severity}</span>
      <h3>根因分析</h3><p>${escapeHtml(result.root_cause || "")}</p>
      <h3>修复步骤</h3><ol>${(result.fix_steps||[]).map(s=>'<li>'+escapeHtml(s)+'</li>').join("")}</ol>
      <h3>预防建议</h3><p>${escapeHtml(result.prevention||"")}</p>
      <p style="margin-top:16px"><a href="/history">&larr; 返回列表</a></p>
    </div>`;
    document.getElementById("history-content").innerHTML = html;
  } catch (e) {
    alert("加载失败: " + e.message);
  }
}

loadHistory();
</script>
</body>
</html>
